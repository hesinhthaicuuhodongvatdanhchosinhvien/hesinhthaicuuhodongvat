<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch sử Donate - PAWCONNECT</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .history-container {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--white);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
    }
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: var(--cream);
      border-radius: var(--radius-sm);
      padding: 1.5rem;
      text-align: center;
    }
    .summary-card h4 {
      font-size: 0.8rem;
      color: var(--mid-gray);
      margin-bottom: 0.5rem;
    }
    .summary-card .value {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--terracotta);
    }
    .filter-bar-history {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .filter-btn-history {
      padding: 0.4rem 1rem;
      background: var(--cream);
      border: 1px solid var(--light-gray);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-btn-history.active {
      background: var(--terracotta);
      color: white;
      border-color: var(--terracotta);
    }
    .donation-table {
      width: 100%;
      border-collapse: collapse;
    }
    .donation-table th {
      text-align: left;
      padding: 0.75rem;
      background: var(--cream);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--mid-gray);
    }
    .donation-table td {
      padding: 0.75rem;
      border-bottom: 1px solid var(--cream-2);
      font-size: 0.85rem;
    }
    .donation-table tr:hover td {
      background: var(--cream);
    }
    .amount {
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--terracotta);
    }
    .empty-state-history {
      text-align: center;
      padding: 4rem;
      color: var(--mid-gray);
    }
  </style>
</head>
<body style="background: var(--cream);">

<div style="max-width: 1000px; margin: 0 auto; padding: 1rem;">
  <a href="index.html" class="back-link" style="color: var(--terracotta); text-decoration: none;">← Quay lại trang chủ</a>
</div>

<div class="history-container">
  <h1 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 0.5rem;">📊 Lịch sử Donate</h1>
  <p style="color: var(--mid-gray); margin-bottom: 2rem;">Minh bạch tài chính - Bạn có thể theo dõi mọi khoản đóng góp và cách sử dụng</p>
  
  <div class="summary-cards" id="summaryCards">
    <!-- JS sẽ inject -->
  </div>
  
  <div class="filter-bar-history" id="filterBar">
    <button class="filter-btn-history active" data-filter="all">Tất cả</button>
    <button class="filter-btn-history" data-filter="pet">Donate theo pet</button>
    <button class="filter-btn-history" data-filter="general">Donate chung</button>
  </div>
  
  <div id="donationList">
    <!-- JS sẽ inject -->
  </div>
</div>

<script>
  const DONATIONS_KEY = "pawlink_donations";
  const PETS_KEY = "pawlink_pets";
  
  const DEFAULT_PETS = [
    { id: 1, name: "Mochi", emoji: "🐱" },
    { id: 2, name: "Bông", emoji: "🐶" },
    { id: 3, name: "Pudding", emoji: "🐱" }
  ];
  
  function getPets() {
    try {
      const stored = JSON.parse(localStorage.getItem(PETS_KEY) || "[]");
      const allPets = [...DEFAULT_PETS];
      stored.forEach(p => {
        if (!allPets.find(existing => existing.id === p.id)) {
          allPets.push({ id: p.id, name: p.name, emoji: p.emoji });
        }
      });
      return allPets;
    } catch { return DEFAULT_PETS; }
  }
  
  function getDonations() {
    try {
      return JSON.parse(localStorage.getItem(DONATIONS_KEY) || "[]");
    } catch { return []; }
  }
  
  function formatPrice(n) {
    return n.toLocaleString("vi-VN") + " VNĐ";
  }
  
  function formatTimeAgo(isoTime) {
    const seconds = Math.floor((new Date() - new Date(isoTime)) / 1000);
    if (seconds < 60) return `${seconds} giây trước`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes} phút trước`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours} giờ trước`;
    if (hours < 168) return `${Math.floor(hours / 24)} ngày trước`;
    return new Date(isoTime).toLocaleDateString("vi-VN");
  }
  
  function getPetName(petId, pets) {
    const pet = pets.find(p => p.id === petId);
    return pet ? `${pet.emoji} ${pet.name}` : "🐾 Không xác định";
  }
  
  function renderPage(filter = "all") {
    const donations = getDonations();
    const pets = getPets();
    
    // Tính tổng
    const totalAmount = donations.reduce((sum, d) => sum + d.amount, 0);
    const totalDonations = donations.length;
    const uniqueDonors = [...new Set(donations.map(d => d.donor))].length;
    
    // Summary cards
    document.getElementById("summaryCards").innerHTML = `
      <div class="summary-card">
        <h4>Tổng quyên góp</h4>
        <div class="value">${formatPrice(totalAmount)}</div>
      </div>
      <div class="summary-card">
        <h4>Tổng số giao dịch</h4>
        <div class="value">${totalDonations}</div>
      </div>
      <div class="summary-card">
        <h4>Nhà hảo tâm</h4>
        <div class="value">${uniqueDonors}</div>
      </div>
    `;
    
    // Filter
    let filteredDonations = donations;
    if (filter === "pet") {
      filteredDonations = donations.filter(d => d.petId);
    } else if (filter === "general") {
      filteredDonations = donations.filter(d => !d.petId);
    }
    
    // Sort by time desc
    filteredDonations.sort((a, b) => new Date(b.time) - new Date(a.time));
    
    if (filteredDonations.length === 0) {
      document.getElementById("donationList").innerHTML = `
        <div class="empty-state-history">
          <div style="font-size: 3rem;">📭</div>
          <h3>Chưa có giao dịch nào</h3>
          <p>Hãy là người đầu tiên donate để cứu trợ các bé!</p>
          <a href="index.html#donate" class="btn-primary" style="display: inline-block; margin-top: 1rem;">Donate ngay</a>
        </div>
      `;
      return;
    }
    
    document.getElementById("donationList").innerHTML = `
      <table class="donation-table">
        <thead>
          <tr>
            <th>Thời gian</th>
            <th>Nhà hảo tâm</th>
            <th>Donate cho</th>
            <th>Mục đích</th>
            <th>Số tiền</th>
          </tr>
        </thead>
        <tbody>
          ${filteredDonations.map(d => `
            <tr>
              <td style="font-size: 0.78rem; color: var(--mid-gray);">${formatTimeAgo(d.time)}</td>
              <td><strong>${d.donor}</strong></td>
              <td>${d.petId ? getPetName(d.petId, pets) : "🌟 Quỹ chung"}</td>
              <td>${d.purpose || "Donate chung"}</td>
              <td class="amount">${formatPrice(d.amount)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }
  
  // Filter buttons
  document.querySelectorAll(".filter-btn-history").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn-history").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderPage(btn.dataset.filter);
    });
  });
  
  renderPage();
</script>
</body>
</html>
