<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bản đồ cứu hộ - PAWCONNECT</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #rescueMap {
      height: 500px;
      border-radius: var(--radius-md);
      margin-bottom: 2rem;
    }
    .map-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--white);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
    }
    .volunteer-list {
      margin-top: 2rem;
    }
    .volunteer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .volunteer-card-map {
      background: var(--cream);
      border-radius: var(--radius-sm);
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .volunteer-avatar-map {
      width: 50px;
      height: 50px;
      background: var(--terracotta);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .report-card {
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 1rem;
      margin-bottom: 1rem;
      border-left: 4px solid var(--terracotta);
    }
  </style>
</head>
<body style="background: var(--cream);">

<div style="max-width: 1200px; margin: 0 auto; padding: 1rem;">
  <a href="index.html" style="color: var(--terracotta); text-decoration: none;">← Quay lại trang chủ</a>
</div>

<div class="map-container">
  <h1 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 0.5rem;">🗺️ Bản đồ cứu hộ</h1>
  <p style="color: var(--mid-gray); margin-bottom: 2rem;">Xem vị trí các case cứu hộ đang hoạt động và tình nguyện viên gần bạn</p>
  
  <div id="rescueMap"></div>
  
  <div class="volunteer-list">
    <h3>🚑 Tình nguyện viên cứu hộ gần đây</h3>
    <div class="volunteer-grid" id="nearbyVolunteers">
      <!-- JS inject -->
    </div>
  </div>
  
  <div style="margin-top: 2rem;">
    <h3>📍 Các case cứu hộ đang xử lý</h3>
    <div id="activeCases">
      <!-- JS inject -->
    </div>
  </div>
</div>

<script>
  // Dữ liệu mẫu - tọa độ TP.HCM
  const RESCUE_LOCATIONS = [
    { id: 1, name: "Mochi", lat: 10.7769, lng: 106.7009, location: "ĐH Bách Khoa, Q.10", status: "urgent", emoji: "🐱" },
    { id: 2, name: "Luna", lat: 10.7821, lng: 106.7039, location: "ĐH Kinh tế, Q.3", status: "urgent", emoji: "🐈" },
    { id: 3, name: "Bông", lat: 10.7622, lng: 106.6825, location: "Nguyễn Trãi, Q.5", status: "watch", emoji: "🐶" },
    { id: 4, name: "Pudding", lat: 10.7931, lng: 106.7213, location: "Ký túc xá ĐHQG Thủ Đức", status: "safe", emoji: "🐱" },
  ];
  
  const VOLUNTEERS = [
    { name: "Nguyễn Minh Anh", area: "Quận 10", phone: "0901234567", avatar: "🌸", distance: "500m", status: "online" },
    { name: "Trần Hoàng Hùng", area: "Thủ Đức", phone: "0912345678", avatar: "🌟", distance: "1.2km", status: "online" },
    { name: "Lê Phương Linh", area: "Quận 3", phone: "0987654321", avatar: "🎀", distance: "800m", status: "busy" },
    { name: "Phạm Văn Khoa", area: "Bình Thạnh", phone: "0978123456", avatar: "⭐", distance: "2km", status: "online" },
  ];
  
  function initMap() {
    const map = L.map('rescueMap').setView([10.7769, 106.7009], 13);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors'
    }).addTo(map);
    
    // Thêm marker cho các case cứu hộ
    RESCUE_LOCATIONS.forEach(loc => {
      const color = loc.status === 'urgent' ? 'red' : loc.status === 'watch' ? 'orange' : 'green';
      const marker = L.marker([loc.lat, loc.lng]).addTo(map);
      marker.bindPopup(`
        <div style="font-family: var(--font-body);">
          <strong>${loc.emoji} ${loc.name}</strong><br/>
          📍 ${loc.location}<br/>
          <span style="color: ${color};">${loc.status === 'urgent' ? '🔴 Khẩn cấp' : loc.status === 'watch' ? '🟡 Theo dõi' : '🟢 An toàn'}</span><br/>
          <button onclick="window.location.href='pet.html?id=${loc.id}'" style="margin-top: 0.5rem; padding: 0.25rem 0.5rem; background: var(--terracotta); color: white; border: none; border-radius: 4px; cursor: pointer;">Xem chi tiết</button>
        </div>
      `);
    });
    
    // Thêm marker tình nguyện viên (giả lập)
    const volunteerMarker = L.marker([10.7785, 106.7035]).addTo(map);
    volunteerMarker.bindPopup(`
      <div>
        <strong>🌟 Đội cứu hộ khu vực Q.10</strong><br/>
        📞 SĐT: 1900-PAW<br/>
        🟢 Đang hoạt động
      </div>
    `);
  }
  
  function renderVolunteers() {
    const container = document.getElementById("nearbyVolunteers");
    container.innerHTML = VOLUNTEERS.map(v => `
      <div class="volunteer-card-map">
        <div class="volunteer-avatar-map">${v.avatar}</div>
        <div>
          <div style="font-weight: 700;">${v.name}</div>
          <div style="font-size: 0.75rem; color: var(--mid-gray);">📍 ${v.area} · ${v.distance}</div>
          <div style="font-size: 0.7rem;">📞 ${v.phone}</div>
          <div><span style="color: ${v.status === 'online' ? 'var(--green-safe)' : 'var(--mid-gray)'};">${v.status === 'online' ? '🟢 Sẵn sàng' : '🔴 Đang bận'}</span></div>
        </div>
      </div>
    `).join("");
  }
  
  function renderCases() {
    const container = document.getElementById("activeCases");
    container.innerHTML = RESCUE_LOCATIONS.map(loc => `
      <div class="report-card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
          <div style="display: flex; align-items: center; gap: 0.75rem;">
            <span style="font-size: 2rem;">${loc.emoji}</span>
            <div>
              <strong style="font-size: 1rem;">${loc.name}</strong>
              <div style="font-size: 0.78rem; color: var(--mid-gray);">${loc.location}</div>
            </div>
          </div>
          <span class="tag tag-${loc.status}">${loc.status === 'urgent' ? '🔴 Cần cứu gấp' : loc.status === 'watch' ? '🟡 Theo dõi' : '🟢 An toàn'}</span>
        </div>
        <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;">
          <button class="btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.75rem;" onclick="showToast('📞 Đang kết nối tình nguyện viên...')">🚨 Gọi cứu hộ</button>
          <button class="btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.75rem;" onclick="window.location.href='pet.html?id=${loc.id}'">📋 Xem chi tiết</button>
        </div>
      </div>
    `).join("");
  }
  
  function showToast(msg) {
    const toast = document.createElement('div');
    toast.textContent = msg;
    toast.style.cssText = `
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--charcoal);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 30px;
      z-index: 9999;
      font-family: var(--font-body);
      font-size: 0.85rem;
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  window.showToast = showToast;
  
  initMap();
  renderVolunteers();
  renderCases();
</script>
</body>
</html>
